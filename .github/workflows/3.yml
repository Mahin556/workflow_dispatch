name: workflow_dispatch_3

on: 
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        type: choice
        options:
          - staging
          - production
      debug:
        description: "Enable debug mode"
        required: true
        type: boolean
        default: false
  push:
    paths:
      - "src/**"
      - "**/*.js"
      - '!**/*.md'
    # paths-ignore:
    #   - "docs/**"
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * 0"
    
jobs:
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true  # Job continues even if tests fail
    steps:
      - run: |
          echo "Linting..."
          exit 1
  
  build:
    needs: lint
    timeout-minutes: 2  # Job fails if it runs longer than 2 minutes
    runs-on: ubuntu-latest
    steps:
      - name: "..." 
        timeout-minutes: 1  # Step fails if it runs longer than 1 minutes
        run: |
          echo "Building..."
          sleep 120s
  
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: echo "Testing..."
  
  deploy:
    runs-on: ubuntu-latest
    needs: 
      - test
      - build
    steps:
      - name: Deploy to ${{ inputs.environment }}
        run: echo "Deploying to ${{ inputs.environment }}"
